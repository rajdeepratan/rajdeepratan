name: Metrics

on:
  # Run manually from the Actions tab
  workflow_dispatch:
  # Refresh once a day
  schedule:
    - cron: "0 6 * * *"
  # Regenerate whenever this workflow changes
  push:
    branches: [master]
    paths: [.github/workflows/metrics.yml]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # PAT stored as a repo secret (see setup notes)
          token: ${{ secrets.METRICS_TOKEN }}
          # Commit the generated SVG into the repo
          filename: assets/github-metrics.svg
          output_action: commit
          committer_branch: master
          committer_message: "chore: update metrics svg"
          # Dark terminal card that fits the arcade theme
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: America/Toronto
          # Recolor the terminal to match the arcade palette (#010409 + gold/green/blue)
          extras_css: >
            pre { background: #010409 !important; color: #c9d1d9 !important; }
            .header { background: #010409 !important; border-bottom: 2px solid #30363d !important; }
            .title { color: #e3b341 !important; }
            .ps1-path { color: #3fb950 !important; }
            .ps1-location { color: #58a6ff !important; }
            .banner { display: none !important; }
            footer { color: #7d8590 !important; }
